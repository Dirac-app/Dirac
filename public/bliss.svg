<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient: deep azure at top, lighter toward horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fc4"/>
      <stop offset="40%" stop-color="#3a9ad9"/>
      <stop offset="75%" stop-color="#72bce8"/>
      <stop offset="100%" stop-color="#a8d8f0"/>
    </linearGradient>
    <!-- Bright green hill gradient -->
    <radialGradient id="hill1" cx="55%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#7ec850"/>
      <stop offset="100%" stop-color="#3a8c1a"/>
    </radialGradient>
    <radialGradient id="hill2" cx="20%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#5db52a"/>
      <stop offset="100%" stop-color="#2d7012"/>
    </radialGradient>
    <radialGradient id="hill3" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6abe38"/>
      <stop offset="100%" stop-color="#357a16"/>
    </radialGradient>
    <!-- Cloud gradient -->
    <radialGradient id="cloud1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Distant hazy hills (far background, pale blue-green) -->
  <ellipse cx="960" cy="640" rx="1400" ry="280" fill="#a8ccb0" opacity="0.4"/>
  <ellipse cx="200" cy="650" rx="600" ry="220" fill="#8fba98" opacity="0.35"/>
  <ellipse cx="1700" cy="655" rx="500" ry="200" fill="#8fba98" opacity="0.35"/>

  <!-- Main rolling green hills -->
  <!-- Center-right main hill (the iconic bright green hill) -->
  <path d="M 480 1080 Q 700 480 1100 580 Q 1400 650 1920 750 L 1920 1080 Z" fill="url(#hill1)"/>
  <!-- Left hill -->
  <path d="M 0 750 Q 200 560 500 630 Q 700 680 900 700 L 900 1080 L 0 1080 Z" fill="url(#hill2)"/>
  <!-- Far right lower hill -->
  <path d="M 1400 1080 Q 1600 700 1920 740 L 1920 1080 Z" fill="url(#hill3)"/>

  <!-- Shadow/depth on hills -->
  <path d="M 480 1080 Q 700 480 1100 580 Q 1300 640 1500 720 L 1500 1080 Z" fill="#2d7012" opacity="0.15"/>

  <!-- Bright highlight on main hill -->
  <ellipse cx="980" cy="570" rx="260" ry="80" fill="#a0e050" opacity="0.35"/>

  <!-- Ground at bottom -->
  <rect x="0" y="900" width="1920" height="180" fill="#3a8c1a" opacity="0.6"/>

  <!-- Cloud 1 (large, left-center) -->
  <ellipse cx="340" cy="200" rx="180" ry="60" fill="white" opacity="0.9"/>
  <ellipse cx="280" cy="215" rx="110" ry="50" fill="white" opacity="0.85"/>
  <ellipse cx="420" cy="210" rx="130" ry="55" fill="white" opacity="0.88"/>
  <ellipse cx="340" cy="230" rx="200" ry="55" fill="white" opacity="0.7"/>

  <!-- Cloud 2 (right side) -->
  <ellipse cx="1420" cy="160" rx="220" ry="65" fill="white" opacity="0.88"/>
  <ellipse cx="1340" cy="175" rx="130" ry="55" fill="white" opacity="0.82"/>
  <ellipse cx="1520" cy="170" rx="160" ry="58" fill="white" opacity="0.85"/>
  <ellipse cx="1420" cy="190" rx="240" ry="52" fill="white" opacity="0.65"/>

  <!-- Cloud 3 (top center, smaller) -->
  <ellipse cx="820" cy="120" rx="120" ry="38" fill="white" opacity="0.75"/>
  <ellipse cx="770" cy="132" rx="80" ry="35" fill="white" opacity="0.70"/>
  <ellipse cx="870" cy="128" rx="90" ry="36" fill="white" opacity="0.72"/>

  <!-- Cloud 4 (upper right) -->
  <ellipse cx="1680" cy="90" rx="140" ry="42" fill="white" opacity="0.72"/>
  <ellipse cx="1620" cy="102" rx="90" ry="38" fill="white" opacity="0.68"/>

  <!-- Subtle sun haze near horizon -->
  <ellipse cx="960" cy="600" rx="600" ry="120" fill="white" opacity="0.08"/>
</svg>
